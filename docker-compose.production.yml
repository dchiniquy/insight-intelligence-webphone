version: '3.8'

services:
  nginx:
    image: us-phoenix-1.ocir.io/axoxnwhj7c1a/insight-intelligence-webphone/nginx:latest
    container_name: webphone-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - webphone-network

  backend:
    image: us-phoenix-1.ocir.io/axoxnwhj7c1a/insight-intelligence-webphone/backend:latest
    container_name: webphone-backend
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/webphone
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secure-jwt-secret-change-this-in-production-2024
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_NUMBERS_CONFIG=${TWILIO_NUMBERS_CONFIG}
      - FRONTEND_URL=http://137.131.4.94
      - BACKEND_URL=http://137.131.4.94
    volumes:
      - ./logs:/app/logs
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped
    networks:
      - webphone-network

  frontend:
    image: us-phoenix-1.ocir.io/axoxnwhj7c1a/insight-intelligence-webphone/frontend:latest
    container_name: webphone-frontend
    environment:
      - REACT_APP_API_URL=http://137.131.4.94/api
      - REACT_APP_WS_URL=ws://137.131.4.94
    restart: unless-stopped
    networks:
      - webphone-network

  mongodb:
    image: mongo:6-focal
    container_name: webphone-mongodb
    environment:
      - MONGO_INITDB_DATABASE=webphone
    volumes:
      - mongodb_data:/data/db
      - ./logs:/var/log/mongodb
    restart: unless-stopped
    networks:
      - webphone-network
    command: mongod --logpath /var/log/mongodb/mongod.log --logappend

  redis:
    image: redis:7-alpine
    container_name: webphone-redis
    volumes:
      - redis_data:/data
      - ./logs:/var/log/redis
    restart: unless-stopped
    networks:
      - webphone-network
    command: redis-server --appendonly yes --logfile /var/log/redis/redis.log

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  webphone-network:
    driver: bridge